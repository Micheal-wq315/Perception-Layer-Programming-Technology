<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>感知层编程技术 · 速记+题库</title>
<style>
:root{
  --bg:#0c0e14; --surface:#131620; --border:#1e2130;
  --text:#e2e4eb; --muted:#7b7f92; --accent:#7b93f5;
  --green:#34d399; --red:#f87171; --amber:#fbbf24;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100svh;line-height:1.65;
}
.hero{
  padding:48px 24px 36px;text-align:center;
  background:radial-gradient(ellipse 60% 50% at 50% 0%, rgba(123,147,245,.08) 0%, transparent 70%);
  border-bottom:1px solid var(--border);
}
.hero h1{font-size:28px;font-weight:800;letter-spacing:-.5px}
.hero p{color:var(--muted);font-size:14px;margin-top:6px}

.wrap{max-width:760px;margin:0 auto;padding:0 20px 80px}

/* tabs */
.tabs{display:flex;gap:0;margin:24px 0 0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.tab-btn{
  flex:1;padding:14px 0;border:none;background:transparent;color:var(--muted);
  font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;
}
.tab-btn.active{background:var(--accent);color:#fff}
.tab-btn:hover:not(.active){background:rgba(123,147,245,.06);color:var(--text)}
.tab-panel{display:none}
.tab-panel.visible{display:block}

/* chapter grid shared */
.chapter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin:20px 0}
.chapter-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 12px;cursor:pointer;text-align:center;transition:all .2s;user-select:none;
}
.chapter-card:hover{border-color:var(--accent);background:rgba(123,147,245,.06)}
.chapter-card.active{border-color:var(--accent);background:rgba(123,147,245,.1);box-shadow:0 0 0 2px rgba(123,147,245,.15)}
.chapter-card .ch-num{font-size:22px;font-weight:800;color:var(--accent)}
.chapter-card .ch-title{font-size:12px;color:var(--muted);margin-top:4px}
.chapter-card .ch-count{font-size:11px;color:var(--muted);margin-top:2px;opacity:.7}

/* ====== FLASHCARD ====== */
.flash-top{display:flex;align-items:center;justify-content:space-between;margin:16px 0 8px;gap:12px;flex-wrap:wrap}
.flash-stats{font-size:13px;color:var(--muted);display:flex;gap:16px}
.flash-stats span{color:var(--accent);font-weight:700}

.flash-card-wrap{perspective:800px;margin:12px 0 16px}
.flash-card{
  position:relative;width:100%;min-height:200px;cursor:pointer;transition:transform .4s;
  transform-style:preserve-3d;user-select:none;
}
.flash-card.flipped{transform:rotateY(180deg)}
.flash-face{
  position:absolute;inset:0;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);border-radius:var(--radius);padding:32px 24px;text-align:center;
  background:var(--surface);flex-direction:column;
}
.flash-front{border-color:var(--accent)}
.flash-back{transform:rotateY(180deg);border-color:var(--green)}
.flash-label{font-size:11px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.flash-question{font-size:20px;font-weight:700;line-height:1.5}
.flash-answer{font-size:18px;font-weight:700;color:var(--green);line-height:1.5}
.flash-hint{font-size:13px;color:var(--muted);margin-top:12px}

.flash-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:8px 0 24px}
.fb{
  padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;
  border:none;font-family:inherit;transition:all .2s;color:#fff;
}
.fb-forgot{background:var(--red)}
.fb-hard{background:var(--amber);color:#0c0e14}
.fb-easy{background:var(--green);color:#0c0e14}
.fb:hover{filter:brightness(1.15)}

.flash-empty{text-align:center;padding:60px 20px;color:var(--muted)}
.flash-empty .big-emoji{font-size:48px;margin-bottom:10px}

/* ====== QUIZ ====== */
.quiz-container{display:none}
.quiz-container.visible{display:block}

.progress-row{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.progress-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .35s}
.progress-label{font-size:13px;color:var(--muted);white-space:nowrap;min-width:60px;text-align:right}

.q-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 28px 24px}
.q-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.q-badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
.q-badge.single{background:rgba(123,147,245,.15);color:var(--accent)}
.q-badge.multi{background:rgba(251,191,36,.15);color:var(--amber)}
.q-idx{font-size:13px;color:var(--muted)}
.q-stem{font-size:16px;line-height:1.8;margin:16px 0 20px;font-weight:500}

.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{
  display:flex;align-items:flex-start;gap:12px;padding:14px 16px;
  border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .18s;
  background:transparent;color:var(--text);font-size:14px;text-align:left;width:100%;font-family:inherit;
}
.opt-btn:hover{border-color:var(--accent);background:rgba(123,147,245,.05)}
.opt-btn.picked{border-color:var(--accent);background:rgba(123,147,245,.1)}
.opt-letter{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;transition:all .18s}
.opt-btn.picked .opt-letter{border-color:var(--accent);background:var(--accent);color:#fff}
.opt-text{flex:1;padding-top:2px}

.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:12px}
.nav-btn{
  padding:10px 22px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  transition:all .2s;font-family:inherit;
}
.nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.nav-btn:disabled{opacity:.35;cursor:default}
.nav-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.nav-btn.primary:hover:not(:disabled){filter:brightness(1.12)}
.q-counter{font-size:13px;color:var(--muted);text-align:center}

/* result */
.result-page{display:none;text-align:center;padding:40px 0}
.result-page.visible{display:block}
.big-ring{width:140px;height:140px;border-radius:50%;margin:0 auto 24px;position:relative;display:flex;align-items:center;justify-content:center}
.big-ring .score-num{font-size:44px;font-weight:800;z-index:1}
.big-ring canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.result-grade{font-size:18px;font-weight:700;margin-bottom:6px}
.result-msg{color:var(--muted);font-size:14px;max-width:400px;margin:0 auto 20px}
.review-list{text-align:left;margin-top:20px}
.review-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.review-item .ri-mark{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ri-mark.ok{background:rgba(52,211,153,.15);color:var(--green)}
.ri-mark.err{background:rgba(248,113,113,.15);color:var(--red)}

.act-btn{
  margin-top:20px;display:inline-flex;align-items:center;gap:6px;padding:12px 28px;border-radius:8px;
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;margin:8px 4px
}
.act-btn:hover{border-color:var(--accent);color:var(--accent)}

@media(max-width:500px){
  .hero h1{font-size:20px}
  .chapter-grid{grid-template-columns:repeat(3,1fr)}
  .q-box{padding:20px 16px}
  .flash-card{min-height:180px}
  .flash-question{font-size:17px}
}
</style>
</head>
<body>

<div class="hero">
  <h1>感知层编程技术</h1>
  <p>知识点速记 + 逐章测试</p>
</div>

<div class="wrap">

  <div class="tabs">
    <button class="tab-btn active" id="tabFlash" onclick="switchTab('flash')">🧠 知识点速记</button>
    <button class="tab-btn" id="tabQuiz" onclick="switchTab('quiz')">📝 章节测试</button>
  </div>

  <!-- ==================== FLASHCARD PANEL ==================== -->
  <div class="tab-panel visible" id="panelFlash">
    <div class="chapter-grid" id="flashChapterGrid"></div>
    <div id="flashArea" style="display:none">
      <div class="flash-top">
        <div class="flash-stats">
          进度 <span id="flashProgress">0/0</span>
          本轮记住 <span style="color:var(--green)" id="flashLearned">0</span>
          待复习 <span style="color:var(--amber)" id="flashRemain">0</span>
        </div>
        <button class="act-btn" onclick="resetFlash()" style="margin:0;padding:8px 16px;font-size:13px">🔄 重置</button>
      </div>
      <div class="flash-card-wrap" id="flashCardWrap">
        <div class="flash-card" id="flashCard" onclick="flipCard()">
          <div class="flash-face flash-front"><div class="flash-label">问题</div><div class="flash-question" id="flashQ"></div></div>
          <div class="flash-face flash-back"><div class="flash-label">答案</div><div class="flash-answer" id="flashA"></div><div class="flash-hint" id="flashH"></div></div>
        </div>
      </div>
      <div class="flash-btns" id="flashBtns" style="display:none">
        <button class="fb fb-forgot" onclick="answerFlash(-1)">😰 忘了</button>
        <button class="fb fb-hard" onclick="answerFlash(0)">🤔 模糊</button>
        <button class="fb fb-easy" onclick="answerFlash(1)">✅ 记住了</button>
      </div>
      <div class="flash-empty" id="flashDone" style="display:none">
        <div class="big-emoji">🎉</div>
        <div>本轮记忆完成！<br><span style="color:var(--muted);font-size:13px">点击"重置"或下一轮会自动安排复习</span></div>
      </div>
    </div>
    <div class="flash-empty" id="flashPickHint">
      <div class="big-emoji">👆</div>
      <span style="color:var(--accent)">点击上方章节</span> 开始速记
    </div>
  </div>

  <!-- ==================== QUIZ PANEL ==================== -->
  <div class="tab-panel" id="panelQuiz">
    <div id="quizPicker">
      <div class="chapter-grid" id="quizChapterGrid"></div>
      <div style="text-align:center;color:var(--muted);padding:40px 0;font-size:14px">👆 <span style="color:var(--accent)">点击章节</span>开始测试</div>
    </div>
    <div class="quiz-container" id="quizContainer">
      <div class="progress-row"><div class="progress-bar"><div class="progress-fill" id="quizPBar"></div></div><span class="progress-label" id="quizPLabel">1/10</span></div>
      <div class="q-box">
        <div class="q-header"><span class="q-badge single" id="quizBadge">单选题</span><span class="q-idx" id="quizIdx"></span></div>
        <div class="q-stem" id="quizStem"></div>
        <div class="options" id="quizOpts"></div>
      </div>
      <div class="nav-row">
        <button class="nav-btn" id="quizPrev" onclick="quizPrev()">← 上一题</button>
        <span class="q-counter" id="quizCounter"></span>
        <button class="nav-btn primary" id="quizNext" onclick="quizNext()">下一题 →</button>
      </div>
      <div class="nav-row" style="justify-content:center;margin-top:8px">
        <button class="nav-btn primary" id="quizSubmit" onclick="quizSubmit()" style="display:none;width:100%;max-width:300px">📝 提交本章答案</button>
      </div>
    </div>
    <div class="result-page" id="quizResult">
      <div class="big-ring"><canvas id="ringCanvas" width="140" height="140"></canvas><span class="score-num" id="scoreNum">0</span></div>
      <div class="result-grade" id="resultGrade"></div>
      <div class="result-msg" id="resultMsg"></div>
      <div class="review-list" id="reviewList"></div>
      <button class="act-btn" onclick="quizBack()">← 返回章节选择</button>
      <button class="act-btn" onclick="quizRetry()">🔄 重做本章</button>
    </div>
  </div>

</div>

<script>
// ==================== Q constructor (fixed: now includes text) ====================
// Q(chapter, type, text, options[], answer, hint)
const Q = (c,ty,tx,o,a,h)=> ({chapter:c,type:ty,text:tx,opts:o,answer:a,hint:h||''});

// ==================== CHAPTERS ====================
const chapters = {
  1:{ title:'概述', questions:[
    Q(1,'single','当前物联网主流参考模型包含的层次数为（ ）',['A. 三层','B. 四层','C. 五层','D. 七层'],1,'感知层→传输层→平台层→应用层，共四层'),
    Q(1,'single','感知层可进一步再分层为（ ）',['A. 物理层与MAC层','B. 设备层与接入层','C. 网络层与传输层','D. 平台层与应用层'],1,'感知层内部再分设备层+接入层'),
    Q(1,'single','以下哪项不属于感知层的核心使命？（ ）',['A. 信息感知','B. 身份识别','C. 数据加密传输','D. 边缘计算'],2,'加密传输是安全/传输层的事'),
    Q(1,'single','物联网四层架构中，位于网络层与应用层之间的是（ ）',['A. 感知层','B. 传输层','C. 平台层','D. 接入层'],2,'网络层之上是平台层'),
    Q(1,'single','下列哪项不是感知层编程的主要技术约束？（ ）',['A. 极致的功耗控制','B. 丰富的计算与存储资源','C. 复杂的部署环境','D. 成本与可靠性要求'],1,'感知层恰恰资源受限！'),
    Q(1,'single','四种嵌入式操作系统中，RAM占用最小的是（ ）',['A. OSAL(1-2KB)','B. μC/OS-II(5KB+)','C. FreeRTOS(2-3KB)','D. RT-Thread(4-6KB)'],0,'OSAL最轻量，ZigBee专用'),
    Q(1,'single','以下芯片中Rx/Tx功耗最低的是（ ）',['A. CC2530','B. CC2652R','C. ESP32-H2','D. EFR32MG24'],3,'EFR32MG24：3.8/4.6mA，-102.7dBm灵敏度'),
    Q(1,'multi','感知层的核心使命包括（ ）',['A. 信息感知','B. 位置定位','C. 身份识别','D. 环境控制','E. 边缘计算'],[0,1,2,3,4],'五大使命全选'),
    Q(1,'multi','以下关于物联网四层架构的描述，正确的有（ ）',['A. 感知层负责数据采集与初步处理','B. 传输层仅负责有线通信','C. 平台层负责数据的汇聚、清洗、存储与开放','D. 应用层直接面向具体业务场景','E. 感知层的技术实现直接决定了上层应用的性能上限'],[0,2,3,4],'B错——传输层还负责WiFi/5G等无线'),
    Q(1,'multi','感知层编程要求开发者具备的能力包括（ ）',['A. 硬件原理理解','B. 操作系统机制','C. 无线通信协议','D. 前端界面设计','E. 软硬件协同设计思维'],[0,1,2,4],'D是干扰项，不需要前端技能'),
    Q(1,'multi','关于四种嵌入式OS的对比，正确的有（ ）',['A. OSAL采用协作式调度','B. OSAL的RAM占用最小(1-2KB)','C. μC/OS-II任务切换最快(5μs)','D. FreeRTOS支持同优先级时间片轮转','E. RT-Thread协议栈支持最完整'],[0,1,2,3,4],'全部正确，PPTX第17-18页'),
    Q(1,'multi','关于ZigBee/Thread/BLE-Mesh对比正确的有（ ）',['A. ZigBee和Thread都使用IEEE 802.15.4','B. Thread是唯一原生支持IPv6的','C. BLE-Mesh可直接手机连接','D. Thread延迟(30-80ms)低于ZigBee(50-100ms)','E. 三种协议都支持星型/树型/Mesh'],[0,1,2,3],'E错——仅ZigBee支持三种拓扑'),
  ]},
  2:{ title:'开发环境与工具链', questions:[
    Q(2,'single','嵌入式开发中需要交叉编译的主要原因是（ ）',['A. 目标硬件性能不足','B. 主机与目标机指令集架构不同','C. 调试器只支持主机平台','D. 操作系统必须运行在主机上'],1,'主机x86 vs 目标8051'),
    Q(2,'single','以下哪个文件建议提交到Git？（ ）',['A. .ewd','B. .dep','C. .ewp','D. Debug目录'],2,'.ewp存储编译配置和芯片选项'),
    Q(2,'single','交叉编译工具链中将汇编代码转换为机器码的组件是（ ）',['A. 编译器','B. 汇编器','C. 链接器','D. 加载器'],1,'汇编器=asm→机器码'),
    Q(2,'single','关于IAR调试功能，下列说法错误的是（ ）',['A. 支持代码断点','B. 支持条件断点','C. 所有中断标志进入调试后自动清除','D. 支持Watch窗口'],2,'并非所有中断标志都自动清除'),
    Q(2,'single','使用Wireshark分析ZigBee加密流量需提供（ ）',['A. 网络密钥','B. MAC地址','C. PAN ID','D. 信道号'],0,'解密ZigBee加密包需网络密钥'),
    Q(2,'single','以下哪项不是TI的ZigBee抓包工具？（ ）',['A. CC2530 USB Dongle','B. Packet Sniffer','C. SmartRF04EB','D. J-Link'],3,'J-Link是通用调试器'),
    Q(2,'multi','交叉编译工具链的核心组件包括（ ）',['A. 编译器','B. 汇编器','C. 链接器','D. 调试器(gdb)','E. 烧录工具'],[0,1,2,3],'四核心：编译→汇编→链接→调试'),
    Q(2,'multi','关于IAR工程文件，正确的有（ ）',['A. .eww记录工作空间中的工程','B. .ewp存储编译选项','C. .ewd必须提交Git共享断点','D. .dep由IDE自动生成','E. Debug目录应加入.gitignore'],[0,1,3,4],'C错-.ewd是个人设置不应提交'),
    Q(2,'multi','定位程序"跑飞"或死机的常用方法包括（ ）',['A. 检查调用堆栈','B. 检查PC','C. 检查SP','D. 反汇编窗口','E. 重新上电'],[0,1,2,3],'重新上电不能定位问题'),
    Q(2,'multi','可用于分析ZigBee协议数据包的工具（ ）',['A. Wireshark','B. TI Packet Sniffer','C. Ubiqua','D. Keil MDK','E. SmartRF Flash Programmer'],[0,1,2],'Keil是IDE,SmartRF是烧录工具'),
  ]},
  3:{ title:'微控制器基础', questions:[
    Q(3,'single','关于微控制器与通用计算机的差异，错误的是（ ）',['A. 微控制器通常资源受限','B. 微控制器对实时性要求较低','C. 微控制器通常集成特定外设','D. 微控制器需考虑低功耗'],1,'MCU对实时性要求更高'),
    Q(3,'single','以下哪条语句直接写寄存器控制引脚电平？（ ）',['A. int x=10;','B. P1_0=1;','C. if(a>b){}','D. while(1);'],1,'P1_0=1直接操作寄存器'),
    Q(3,'single','关于中断机制，正确的是（ ）',['A. 中断只能由外部触发','B. 中断响应后CPU不保存状态','C. ISR应尽量短小精悍','D. 同优先级中断可嵌套'],2,'ISR"短平快"原则'),

// ==================== FLASHCARD STATE ====================
let flashState = []; // {data, level, lastRound, scheduled:bool}
let flashCurrent = -1;
let flashCh = null;
let flashRound = 0;
const FLASH_INTERVAL = 3; // re-review every 3 rounds

function initFlashChapter(ch){
  flashCh = ch;
  flashRound = 1;
  flashState = flashData.filter(d=>d.ch===ch).map(d=>({data:d,level:0,lastRound:1,scheduled:true}));
  shuffle(flashState);
  flashCurrent = -1;
  document.getElementById('flashArea').style.display='block';
  document.getElementById('flashPickHint').style.display='none';
  document.getElementById('flashDone').style.display='none';
  updateFlashStats();
  nextFlashCard();
}

function updateFlashStats(){
  const total = flashState.length;
  const scheduled = flashState.filter(s=>s.scheduled).length;
  const done = flashState.filter(s=>!s.scheduled).length;
  document.getElementById('flashProgress').textContent = (done)+'/'+total;
  document.getElementById('flashLearned').textContent = flashState.filter(s=>s.level===2).length;
  document.getElementById('flashRemain').textContent = scheduled;
}

function nextFlashCard(){
  // find next scheduled
  const idx = flashState.findIndex((s,i)=>s.scheduled && i>flashCurrent);
  if(idx===-1){
    // wrap: find first scheduled
    const idx2 = flashState.findIndex(s=>s.scheduled);
    if(idx2===-1){
      // all done, start next round
      flashRound++;
      if(flashRound % FLASH_INTERVAL === 0){
        // re-activate all cards for re-review
        flashState.forEach(s=>{s.scheduled=true;s.lastRound=flashRound;});
        shuffle(flashState);
      } else {
        // only reactivate cards that were not fully learned (level<2)
        const toReactivate = flashState.filter(s=>s.level<2);
        if(toReactivate.length===0){
          document.getElementById('flashCardWrap').style.display='none';
          document.getElementById('flashBtns').style.display='none';
          document.getElementById('flashDone').style.display='block';
          updateFlashStats();
          return;
        }
        toReactivate.forEach(s=>{s.scheduled=true;s.lastRound=flashRound;});
        shuffle(flashState);
      }
      flashCurrent = -1;
      return nextFlashCard();
    }
    flashCurrent = -1;
    return nextFlashCard();
  }
  flashCurrent = idx;
  const item = flashState[idx];
  document.getElementById('flashQ').textContent = item.data.q;
  document.getElementById('flashA').textContent = item.data.a;
  document.getElementById('flashH').textContent = '💡 '+item.data.h;
  document.getElementById('flashCard').classList.remove('flipped');
  document.getElementById('flashBtns').style.display = 'flex';
  document.getElementById('flashDone').style.display = 'none';
  document.getElementById('flashCardWrap').style.display='block';
  document.getElementById('flashProgress').textContent = (flashState.filter(s=>!s.scheduled).length)+'/'+flashState.length;
  document.getElementById('flashRemain').textContent = flashState.filter(s=>s.scheduled).length;
}

function flipCard(){
  document.getElementById('flashCard').classList.toggle('flipped');
}

function answerFlash(score){ // score: -1=forgot, 0=hard, 1=easy
  const item = flashState[flashCurrent];
  item.scheduled = false;
  if(score===1) item.level = Math.min(2, item.level+1);
  else if(score===0) item.level = Math.max(0, item.level);
  else item.level = Math.max(0, item.level-1);
  updateFlashStats();
  document.getElementById('flashCard').classList.remove('flipped');
  setTimeout(()=>nextFlashCard(), 300);
}

function resetFlash(){
  initFlashChapter(flashCh);
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
}

// ==================== UI: FLASH CHAPTER GRID ====================
function renderFlashChapters(){
  const grid = document.getElementById('flashChapterGrid');
  let h='';
  for(const [ch, data] of Object.entries(chapters)){
    const count = flashData.filter(d=>d.ch===parseInt(ch)).length;
    h += `<div class="chapter-card" data-ch="${ch}" onclick="selectFlashChapter(${ch})">
      <div class="ch-num">${ch}</div><div class="ch-title">${data.title}</div><div class="ch-count">${count}条考点</div></div>`;
  }
  grid.innerHTML = h;
}
function selectFlashChapter(ch){
  document.querySelectorAll('#flashChapterGrid .chapter-card').forEach(c=>c.classList.remove('active'));
  const card = document.querySelector(`#flashChapterGrid .chapter-card[data-ch="${ch}"]`);
  if(card) card.classList.add('active');
  initFlashChapter(ch);
}

// ==================== TAB SWITCH ====================
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('visible'));
  if(tab==='flash'){
    document.getElementById('tabFlash').classList.add('active');
    document.getElementById('panelFlash').classList.add('visible');
  } else {
    document.getElementById('tabQuiz').classList.add('active');
    document.getElementById('panelQuiz').classList.add('visible');
  }
}

// ==================== QUIZ STATE ====================
let quizCh = null, quizIdx = 0, quizAnswers = [], quizSubmitted = false;

function renderQuizChapters(){
  const grid = document.getElementById('quizChapterGrid');
  let h='';
  for(const [ch, data] of Object.entries(chapters)){
    h += `<div class="chapter-card" data-ch="${ch}" onclick="selectQuizChapter(${ch})">
      <div class="ch-num">${ch}</div><div class="ch-title">${data.title}</div><div class="ch-count">${data.questions.length}题</div></div>`;
  }
  grid.innerHTML = h;
}

function selectQuizChapter(ch){
  quizCh = ch; quizIdx = 0; quizSubmitted = false;
  const qs = chapters[ch].questions;
  quizAnswers = qs.map(()=>({picked:new Set()}));
  document.querySelectorAll('#quizChapterGrid .chapter-card').forEach(c=>c.classList.remove('active'));
  const card = document.querySelector(`#quizChapterGrid .chapter-card[data-ch="${ch}"]`);
  if(card) card.classList.add('active');
  document.getElementById('quizPicker').style.display='none';
  document.getElementById('quizContainer').classList.add('visible');
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizSubmit').style.display='block';
  renderQuizQ();
}

function renderQuizQ(){
  const qs = chapters[quizCh].questions;
  const q = qs[quizIdx];
  const total = qs.length;
  document.getElementById('quizPBar').style.width = ((quizIdx+1)/total*100)+'%';
  document.getElementById('quizPLabel').textContent = (quizIdx+1)+'/'+total;
  const badge = document.getElementById('quizBadge');
  badge.textContent = q.type==='multi'?'多选题':'单选题';
  badge.className = 'q-badge '+(q.type==='multi'?'multi':'single');
  document.getElementById('quizIdx').textContent = `第${quizIdx+1}题 / 共${total}题`;
  document.getElementById('quizStem').textContent = q.text;
  const optsDiv = document.getElementById('quizOpts');
  const letters = 'ABCDEFGH';
  let h='';
  q.opts.forEach((opt,i)=>{
    const picked = quizAnswers[quizIdx].picked.has(i);
    h += `<button class="opt-btn${picked?' picked':''}" onclick="pickQuizOpt(${i})"><span class="opt-letter">${letters[i]}</span><span class="opt-text">${opt}</span></button>`;
  });
  optsDiv.innerHTML = h;
  document.getElementById('quizPrev').disabled = quizIdx===0;
  document.getElementById('quizNext').textContent = (quizIdx===total-1)?'最后一题 ✓':'下一题 →';
  document.getElementById('quizCounter').textContent = '第'+chapters[quizCh].title+'章';
  document.querySelector('.q-box').scrollIntoView({behavior:'smooth',block:'center'});
}

function pickQuizOpt(i){
  if(quizSubmitted) return;
  const q = chapters[quizCh].questions[quizIdx];
  const ua = quizAnswers[quizIdx];
  if(q.type==='single'){
    if(ua.picked.has(i)) ua.picked.clear();
    else {ua.picked.clear();ua.picked.add(i);}
  }else{
    if(ua.picked.has(i)) ua.picked.delete(i); else ua.picked.add(i);
  }
  const optsDiv = document.getElementById('quizOpts');
  const letters = 'ABCDEFGH';
  let h='';
  q.opts.forEach((opt,j)=>{
    const p = ua.picked.has(j);
    h += `<button class="opt-btn${p?' picked':''}" onclick="pickQuizOpt(${j})"><span class="opt-letter">${letters[j]}</span><span class="opt-text">${opt}</span></button>`;
  });
  optsDiv.innerHTML = h;
}

function quizPrev(){if(quizIdx>0){quizIdx--;renderQuizQ();}}
function quizNext(){
  const total = chapters[quizCh].questions.length;
  if(quizIdx<total-1){quizIdx++;renderQuizQ();}
}

document.addEventListener('keydown',e=>{
  if(!quizCh || quizSubmitted) return;
  const q = chapters[quizCh].questions[quizIdx];
  if(e.key==='ArrowLeft') quizPrev();
  if(e.key==='ArrowRight') quizNext();
  const idx = 'abcdefgh'.indexOf(e.key.toLowerCase());
  if(idx>=0 && idx<q.opts.length) pickQuizOpt(idx);
});

function quizSubmit(){
  if(quizSubmitted) return;
  const unanswered = quizAnswers.filter(ua=>ua.picked.size===0).length;
  if(unanswered>0 && !confirm(`还有${unanswered}题未作答，确定提交吗？`)) return;
  quizSubmitted = true;
  document.getElementById('quizSubmit').style.display='none';
  document.getElementById('quizPrev').disabled = true;
  document.getElementById('quizNext').disabled = true;
  const qs = chapters[quizCh].questions;
  let correct = 0; const review = [];
  qs.forEach((q,i)=>{
    const ua = quizAnswers[i];
    let ok = false;
    if(q.type==='single'){
      ok = q.answer === [...ua.picked][0] && ua.picked.size===1;
    } else {
      const ansSet = new Set(q.answer);
      ok = ua.picked.size===ansSet.size && [...ua.picked].every(v=>ansSet.has(v));
    }
    if(ok) correct++;
    review.push({num:i+1,type:q.type,text:q.text,opts:q.opts,picked:ua.picked,answer:q.answer,hint:q.hint,ok});
  });
  showQuizResult(correct, qs.length, review);
}

function showQuizResult(correct, total, review){
  document.getElementById('quizContainer').classList.remove('visible');
  const rp = document.getElementById('quizResult');
  rp.classList.add('visible'); rp.scrollIntoView({behavior:'smooth'});
  const pct = Math.round(correct/total*100);
  document.getElementById('scoreNum').textContent = correct+'/'+total;
  const canvas = document.getElementById('ringCanvas'), ctx = canvas.getContext('2d');
  const r=60,cx=70,cy=70;
  ctx.clearRect(0,0,140,140);
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='#1e2130';ctx.lineWidth=10;ctx.stroke();
  const color = pct>=80?'#34d399':pct>=50?'#fbbf24':'#f87171';
  ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+(pct/100)*Math.PI*2);ctx.strokeStyle=color;ctx.lineWidth=10;ctx.lineCap='round';ctx.stroke();
  let grade='',msg='';
  if(pct>=90){grade='🎉 优秀！';msg='第'+quizCh+'章知识掌握非常扎实。';}
  else if(pct>=70){grade='👍 良好';msg='基本掌握，建议回顾错题。';}
  else if(pct>=50){grade='📖 还需努力';msg='建议重新阅读PPTX讲义。';}
  else{grade='💪 继续加油';msg='基础知识还需加强。';}
  document.getElementById('resultGrade').textContent=grade;
  document.getElementById('resultMsg').textContent=msg;
  const letters='ABCDEFGH';
  let rv='';
  review.forEach(rv2=>{
    const u = [...rv2.picked].map(i=>letters[i]).join('')||'未选';
    const a = (Array.isArray(rv2.answer)?rv2.answer:[rv2.answer]).map(i=>letters[i]).join('');
    rv += `<div class="review-item"><div class="ri-mark ${rv2.ok?'ok':'err'}">${rv2.ok?'✓':'✗'}</div><div>
      <strong>${rv2.type==='multi'?'[多选]':'[单选]'} 第${rv2.num}题</strong>
      ${rv2.ok?'<span style="color:var(--green)"> ✅ '+a+'</span>':'<span style="color:var(--red)"> ❌ 你的:'+u+' → 正确:'+a+'</span>'}
      <div style="color:var(--muted);margin-top:2px">💡 ${rv2.hint}</div></div></div>`;
  });
  document.getElementById('reviewList').innerHTML=rv;
}

function quizBack(){
  document.getElementById('quizContainer').classList.remove('visible');
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizPicker').style.display='block';
  document.getElementById('quizSubmit').style.display='none';
  quizCh=null; quizSubmitted=false;
}
function quizRetry(){
  const ch=quizCh; quizBack();
  document.getElementById('quizPicker').style.display='none';
  setTimeout(()=>selectQuizChapter(ch),100);
}

// init
renderFlashChapters();
renderQuizChapters();
</script>
