<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>感知层编程技术 · 逐章题库</title>
<style>
:root{
  --bg:#0c0e14; --surface:#131620; --border:#1e2130;
  --text:#e2e4eb; --muted:#7b7f92; --accent:#7b93f5;
  --green:#34d399; --red:#f87171; --amber:#fbbf24;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100svh;line-height:1.65;
  overflow-x:hidden;
}

.hero{
  padding:56px 24px 48px;text-align:center;
  background:radial-gradient(ellipse 60% 50% at 50% 0%, rgba(123,147,245,.08) 0%, transparent 70%);
  border-bottom:1px solid var(--border);
}
.hero h1{font-size:30px;font-weight:800;letter-spacing:-.5px}
.hero p{color:var(--muted);font-size:15px;margin-top:8px;max-width:520px;margin-left:auto;margin-right:auto}

.wrap{max-width:700px;margin:0 auto;padding:0 20px 80px}

/* chapter picker */
.chapter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin:28px 0 10px}
.chapter-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 12px;cursor:pointer;text-align:center;transition:all .2s;
  user-select:none;
}
.chapter-card:hover{border-color:var(--accent);background:rgba(123,147,245,.06)}
.chapter-card.active{border-color:var(--accent);background:rgba(123,147,245,.1);box-shadow:0 0 0 2px rgba(123,147,245,.15)}
.chapter-card .ch-num{font-size:22px;font-weight:800;color:var(--accent)}
.chapter-card .ch-title{font-size:12px;color:var(--muted);margin-top:4px}
.chapter-card .ch-count{font-size:11px;color:var(--muted);margin-top:2px;opacity:.7}

.divider{height:1px;background:var(--border);margin:20px 0}

/* question area */
.quiz-section{display:none}
.quiz-section.visible{display:block}

.progress-row{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.progress-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .35s}
.progress-label{font-size:13px;color:var(--muted);white-space:nowrap;min-width:60px;text-align:right}

.q-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 28px 24px}
.q-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.q-badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
.q-badge.single{background:rgba(123,147,245,.15);color:var(--accent)}
.q-badge.multi{background:rgba(251,191,36,.15);color:var(--amber)}
.q-idx{font-size:13px;color:var(--muted)}
.q-stem{font-size:16px;line-height:1.8;margin:16px 0 20px;font-weight:500}

.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{
  display:flex;align-items:flex-start;gap:12px;padding:14px 16px;
  border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .18s;
  background:transparent;color:var(--text);font-size:14px;text-align:left;width:100%;
  font-family:inherit;
}
.opt-btn:hover{border-color:var(--accent);background:rgba(123,147,245,.05)}
.opt-btn.picked{border-color:var(--accent);background:rgba(123,147,245,.1)}
.opt-letter{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;transition:all .18s}
.opt-btn.picked .opt-letter{border-color:var(--accent);background:var(--accent);color:#fff}
.opt-text{flex:1;padding-top:2px}

.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:12px}
.nav-btn{
  padding:10px 22px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  transition:all .2s;font-family:inherit;
}
.nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.nav-btn:disabled{opacity:.35;cursor:default}

.nav-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.nav-btn.primary:hover:not(:disabled){filter:brightness(1.12)}

.q-counter{font-size:13px;color:var(--muted);text-align:center}

/* result page */
.result-page{display:none;text-align:center;padding:40px 0}
.result-page.visible{display:block}
.big-ring{width:140px;height:140px;border-radius:50%;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;position:relative}
.big-ring .score-num{font-size:44px;font-weight:800;z-index:1}
.big-ring canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.result-grade{font-size:18px;font-weight:700;margin-bottom:6px}
.result-msg{color:var(--muted);font-size:14px;max-width:400px;margin:0 auto 20px}
.review-list{text-align:left;margin-top:20px}
.review-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.review-item .ri-mark{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ri-mark.ok{background:rgba(52,211,153,.15);color:var(--green)}
.ri-mark.err{background:rgba(248,113,113,.15);color:var(--red)}

.back-btn{margin-top:24px;display:inline-flex;align-items:center;gap:6px;padding:12px 28px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}

/* picker hint */
.pick-hint{text-align:center;color:var(--muted);font-size:14px;padding:60px 0}
.pick-hint span{color:var(--accent)}

@media(max-width:500px){
  .hero h1{font-size:22px}
  .chapter-grid{grid-template-columns:repeat(3,1fr)}
  .q-box{padding:20px 16px}
  .nav-btn{padding:10px 16px;font-size:13px}
}
</style>
</head>
<body>

<div class="hero">
  <h1>感知层编程技术</h1>
  <p>选择章节，逐题练习。每章单选题 + 多选题，提交后自动判分。</p>
</div>

<div class="wrap">

  <div id="picker">
    <div class="chapter-grid" id="chapterGrid"></div>
    <div class="pick-hint">👆 <span>点击上方章节卡片</span>开始答题</div>
  </div>

  <div class="quiz-section" id="quizSection">
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <span class="progress-label" id="progressLabel">1/10</span>
    </div>
    <div class="q-box">
      <div class="q-header">
        <span class="q-badge single" id="qBadge">单选题</span>
        <span class="q-idx" id="qIdx"></span>
      </div>
      <div class="q-stem" id="qStem"></div>
      <div class="options" id="qOptions"></div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" onclick="prevQ()">← 上一题</button>
      <span class="q-counter" id="qCounter"></span>
      <button class="nav-btn primary" id="nextBtn" onclick="nextQ()">下一题 →</button>
    </div>
    <div class="nav-row" style="justify-content:center;margin-top:8px">
      <button class="nav-btn primary" id="submitBtn" onclick="submitChapter()" style="display:none;width:100%;max-width:300px">📝 提交本章答案</button>
    </div>
  </div>

  <div class="result-page" id="resultPage">
    <div class="big-ring" id="bigRing">
      <canvas id="ringCanvas" width="140" height="140"></canvas>
      <span class="score-num" id="scoreNum">0</span>
    </div>
    <div class="result-grade" id="resultGrade"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="review-list" id="reviewList"></div>
    <button class="back-btn" onclick="goBack()">← 返回章节选择</button>
    <button class="back-btn" onclick="retryChapter()" style="margin-left:8px">🔄 重做本章</button>
  </div>

</div>

<script>
// ==================== QUESTION BANK ====================
const Q = (c,t,o,a,h)=> ({chapter:c,type:t,opts:o,answer:a,hint:h||''});

const chapters = {
  1:{ title:'概述', questions:[
    Q(1,'single',['A. 三层','B. 四层','C. 五层','D. 七层'],1,'感知层→传输层→平台层→应用层，共四层'),
    Q(1,'single',['A. 信息感知','B. 身份识别','C. 数据加密传输','D. 边缘计算'],2,'加密传输是安全/传输层的事'),
    Q(1,'single',['A. 物理层与MAC层','B. 设备层与接入层','C. 网络层与传输层','D. 平台层与应用层'],1,'感知层内部再分设备层和接入层'),
    Q(1,'single',['A. 感知层','B. 传输层','C. 平台层','D. 接入层'],2,'网络层之上是平台层'),
    Q(1,'single',['A. 极致的功耗控制','B. 丰富的计算与存储资源','C. 复杂的部署环境','D. 成本与可靠性要求'],1,'感知层恰恰资源受限！'),
    Q(1,'single',['A. OSAL(1-2KB)','B. μC/OS-II(5KB+)','C. FreeRTOS(2-3KB)','D. RT-Thread(4-6KB)'],0,'OSAL最轻量，ZigBee专用'),
    Q(1,'single',['A. CC2530','B. CC2652R','C. ESP32-H2','D. EFR32MG24'],3,'EFR32MG24 灵敏度-102.7dBm，功耗3.8/4.6mA最优'),
    Q(1,'multi',['A. 信息感知','B. 位置定位','C. 身份识别','D. 环境控制','E. 边缘计算'],[0,1,2,3,4],'五大使命全选'),
    Q(1,'multi',['A. 感知层负责数据采集与初步处理','B. 传输层仅负责有线通信','C. 平台层负责数据的汇聚、清洗、存储与开放','D. 应用层直接面向具体业务场景','E. 感知层的技术实现直接决定了上层应用的性能上限'],[0,2,3,4],'B错——传输层还负责WiFi/5G等无线方式'),
    Q(1,'multi',['A. 硬件原理理解','B. 操作系统机制','C. 无线通信协议','D. 前端界面设计','E. 软硬件协同设计思维'],[0,1,2,4],'D是干扰项，感知层不需要前端技能'),
    Q(1,'multi',['A. OSAL采用协作式调度，不支持抢占','B. OSAL的RAM占用最小(1-2KB)','C. μC/OS-II的任务切换最快(5μs)','D. FreeRTOS支持同优先级时间片轮转','E. RT-Thread协议栈支持最完整'],[0,1,2,3,4],'全部正确，PPTX第17-18页核心结论'),
    Q(1,'multi',['A. ZigBee和Thread都使用IEEE 802.15.4作为物理层和MAC层','B. Thread是唯一原生支持IPv6的协议','C. BLE-Mesh可以直接被手机连接，无需网关','D. 4跳场景下Thread延迟(30-80ms)低于ZigBee(50-100ms)','E. 三种协议都支持星型树型Mesh拓扑'],[0,1,2,3],'E错——仅ZigBee支持三种拓扑'),
  ]},
  2:{ title:'开发环境与工具链', questions:[
    Q(2,'single',['A. 目标硬件性能不足','B. 主机与目标机指令集架构不同','C. 调试器只支持主机平台','D. 操作系统必须运行在主机上'],1,'主机(x86)和目标机(8051)指令集不同'),
    Q(2,'single',['A. .ewd','B. .dep','C. .ewp','D. Debug目录'],2,'.ewp存储编译配置和芯片选项，应提交Git'),
    Q(2,'single',['A. 编译器','B. 汇编器','C. 链接器','D. 加载器'],1,'汇编器把汇编代码转成机器码'),
    Q(2,'single',['A. 支持设置代码断点','B. 支持条件断点','C. 所有中断标志在进入调试后自动清除','D. 支持Watch窗口观察变量'],2,'并非所有中断标志都自动清除'),
    Q(2,'single',['A. 网络密钥','B. 设备MAC地址','C. PAN ID','D. 信道号'],0,'Wireshark解ZigBee加密需提供网络密钥'),
    Q(2,'single',['A. CC2530 USB Dongle','B. Packet Sniffer','C. SmartRF04EB','D. J-Link'],3,'J-Link是通用调试器，不是TI的ZigBee抓包工具'),
    Q(2,'multi',['A. 编译器','B. 汇编器','C. 链接器','D. 调试器(gdb)','E. 烧录工具'],[0,1,2,3],'交叉编译工具链四核心组件'),
    Q(2,'multi',['A. .eww记录工作空间中包含哪些工程','B. .ewp存储编译选项和芯片配置','C. .ewd必须提交Git以便团队共享断点','D. .dep由IDE自动生成，记录文件依赖','E. Debug目录应加入.gitignore'],[0,1,3,4],'C错——.ewd存储个人调试设置，不应提交Git'),
    Q(2,'multi',['A. 检查调用堆栈','B. 检查程序计数器(PC)','C. 检查堆栈指针(SP)','D. 使用反汇编窗口分析','E. 重新上电'],[0,1,2,3],'重新上电只是绕过问题，不是调试方法'),
    Q(2,'multi',['A. Wireshark','B. TI Packet Sniffer','C. Ubiqua','D. Keil MDK','E. SmartRF Flash Programmer'],[0,1,2],'Keil MDK是IDE，SmartRF Flash Programmer是烧录工具'),
  ]},
  3:{ title:'微控制器基础', questions:[
    Q(3,'single',['A. 微控制器通常资源受限','B. 微控制器对实时性要求较低','C. 微控制器通常集成了特定外设','D. 微控制器设计需考虑低功耗'],1,'微控制器恰恰对实时性要求更高'),
    Q(3,'single',['A. int x = 10;','B. P1_0 = 1;','C. if (a > b) { ... }','D. while(1);'],1,'P1_0=1直接写寄存器控制引脚电平'),
    Q(3,'single',['A. 中断只能由外部硬件事件触发','B. 中断响应后CPU不会保存当前状态','C. 中断服务程序应尽量短小精悍','D. 同优先级中断可以互相嵌套'],2,'ISR"短平快"原则是核心考点'),
    Q(3,'single',['A. 哈佛结构不支持中断','B. 哈佛结构将指令存储器和数据存储器分离','C. 冯·诺依曼结构只能顺序执行','D. 哈佛结构功耗更低'],1,'哈佛结构的核心特征是指令/数据分离'),
    Q(3,'single',['A. 初始化栈指针','B. 清零.bss段','C. 复制.data段','D. 跳转到main函数'],2,'.data段=已初始化全局变量从Flash→RAM'),
    Q(3,'single',['A. 启动代码用于固件升级，引导程序用于建立C运行环境','B. 启动代码是每个C程序必需的，引导程序仅在需要OTA时才存在','C. 两者功能完全相同','D. 引导程序由编译器自动提供'],1,'启动代码建立C环境,Bootloader负责固件升级/OTA'),
    Q(3,'multi',['A. 资源受限','B. 实时性要求高','C. 多用户分时操作系统','D. 低功耗设计','E. 专用性优化'],[0,1,3,4],'C错-MCU不用多用户分时系统'),
    Q(3,'multi',['A. 降低CPU负载','B. 降低系统功耗','C. 响应延迟更短且确定','D. 无需配置中断优先级','E. 能够同时处理多个中断'],[0,1,2],'中断仍需配优先级，同时处理能力有限'),
    Q(3,'multi',['A. 初始化栈指针(SP)','B. 初始化已初始化全局变量(.data段)','C. 清零未初始化全局变量(.bss段)','D. 配置外设时钟','E. 跳转至main函数'],[0,1,2,4],'启动代码四步：SP→.data→.bss→main'),
    Q(3,'multi',['A. 程序存储器和数据存储器物理上分开','B. 支持在一个时钟周期内同时取指和访存','C. 所有变量都必须存放在DATA空间','D. 指令执行时间更可预测','E. CODE和DATA共用同一组总线'],[0,1,3],'C错-XDATA也可存变量；E错-哈佛结构总线分离'),
  ]},
  4:{ title:'CC2530硬件架构', questions:[
    Q(4,'single',['A. 单时钟周期指令','B. 第二个数据指针(DPTR1)','C. 扩展的中断系统(18个中断源)','D. 内置浮点运算单元'],3,'CC2530的8051无硬件浮点单元'),
    Q(4,'single',['A. CODE','B. DATA','C. XDATA','D. SFR'],2,'XDATA用于DMA和大容量数据访问'),
    Q(4,'single',['A. SFR空间只能通过XDATA地址访问','B. DATA空间的高128字节只能间接寻址','C. CODE空间只能映射Flash','D. XDATA空间只能访问外部RAM'],1,'高128字节与SFR地址重叠，必须间接寻址'),
    Q(4,'single',['A. 所有中断标志均由硬件自动清除','B. 仅阴影框标志由硬件清除，非阴影框需软件清除','C. 所有标志都需软件清除','D. 只有全局中断标志需软件清除'],1,'关键区分：阴影框=硬件清，非阴影框=软件清'),
    Q(4,'single',['A. IP1=1,IP0=1','B. IP1=0,IP0=1','C. IP1=1,IP0=0','D. IP1=0,IP0=0'],0,'IP1=1,IP0=1 → 级别3(最高)'),
    Q(4,'single',['A. 32MHz晶体振荡器','B. 16MHz RC振荡器','C. 睡眠定时器与选定的32kHz振荡器','D. 数字稳压器'],2,'PM2仅保留32kHz和睡眠定时器'),
    Q(4,'single',['A. 每页大小为2KB','B. 擦写寿命约为20000次','C. 信息页可被用户擦除改写','D. 支持预取功能提升代码执行速度'],2,'信息页面是只读的，不可擦除'),
    Q(4,'multi',['A. CODE','B. DATA','C. XDATA','D. SFR','E. XREG'],[1,3],'DATA和SFR支持单周期访问'),
    Q(4,'multi',['A. 单时钟周期指令','B. 第二个数据指针(DPTR1)','C. 18个中断源','D. 内置硬件乘法器','E. 支持32位指令'],[0,1,2],'无乘法器无32位指令'),
    Q(4,'multi',['A. 共6个中断优先级组(IPG0-IPG5)','B. 每组由IP1_x和IP0_x两位编码4个级别','C. 正在执行的ISR可被同优先级中断打断','D. 同优先级同时发生按固定轮询顺序','E. 中断嵌套仅发生在更高优先级中断到达时'],[0,1,3,4],'C错-同优先级不打断'),
    Q(4,'multi',['A. 活动模式','B. 空闲模式','C. PM1','D. PM2','E. PM3'],[0,1,2,3,4],'CC2530五种供电模式全选'),
  ]},
  5:{ title:'CC2530片内外设', questions:[
    Q(5,'single',['A. P1SEL|=0x04;P1DIR|=0x04;P1_2=1','B. P1SEL&=~0x04;P1DIR|=0x04;P1_2=1','C. P1SEL&=~0x04;P1DIR&=~0x04;P1_2=1','D. P1SEL|=0x04;P1DIR&=~0x04;P1_2=1'],1,'GPIO模式→P1SEL清0；输出→P1DIR置1'),
    Q(5,'single',['A. 通信双方需要共享时钟线','B. 每帧数据必须以高电平起始','C. 波特率是比特时间的倒数','D. 数据位传输默认为MSB优先'],2,'波特率=1/比特时间'),

// ==================== APP STATE ====================
let currentChapter = null;
let currentQIdx = 0;
let userAnswers = [];   // array of { picked: Set of indices }
let submitted = false;

// ==================== RENDER CHAPTER GRID ====================
function renderChapterGrid(){
  const grid = document.getElementById('chapterGrid');
  let html = '';
  for(const [ch, data] of Object.entries(chapters)){
    const single = data.questions.filter(q=>q.type==='single').length;
    const multi = data.questions.filter(q=>q.type==='multi').length;
    html += `<div class="chapter-card" onclick="selectChapter(${ch})" data-ch="${ch}">
      <div class="ch-num">${ch}</div>
      <div class="ch-title">${data.title}</div>
      <div class="ch-count">单选${single} + 多选${multi}</div>
    </div>`;
  }
  grid.innerHTML = html;
}

// ==================== SELECT CHAPTER ====================
function selectChapter(ch){
  currentChapter = ch;
  currentQIdx = 0;
  submitted = false;
  const qs = chapters[ch].questions;
  userAnswers = qs.map(q => ({ picked: new Set() }));

  // highlight card
  document.querySelectorAll('.chapter-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.chapter-card[data-ch="${ch}"]`);
  if(card) card.classList.add('active');

  document.getElementById('picker').style.display = 'none';
  document.getElementById('quizSection').classList.add('visible');
  document.getElementById('resultPage').classList.remove('visible');
  document.getElementById('submitBtn').style.display = 'block';
  renderQuestion();
}

// ==================== RENDER QUESTION ====================
function renderQuestion(){
  const qs = chapters[currentChapter].questions;
  const q = qs[currentQIdx];
  const total = qs.length;

  // progress
  document.getElementById('progressFill').style.width = ((currentQIdx+1)/total*100)+'%';
  document.getElementById('progressLabel').textContent = (currentQIdx+1)+'/'+total;

  // badge
  const badge = document.getElementById('qBadge');
  badge.textContent = q.type==='multi'?'多选题':'单选题';
  badge.className = 'q-badge '+(q.type==='multi'?'multi':'single');

  // index
  document.getElementById('qIdx').textContent = `第 ${currentQIdx+1} 题 / 共 ${total} 题`;

  // stem
  document.getElementById('qStem').textContent = q.opts ? q.text : '';

  // options
  const optsDiv = document.getElementById('qOptions');
  const letters = 'ABCDEFGH';
  let html = '';
  q.opts.forEach((opt, i) => {
    const picked = userAnswers[currentQIdx].picked.has(i);
    html += `<button class="opt-btn${picked?' picked':''}" onclick="pickOption(${i})">
      <span class="opt-letter">${letters[i]}</span>
      <span class="opt-text">${opt}</span>
    </button>`;
  });
  optsDiv.innerHTML = html;

  // nav
  document.getElementById('prevBtn').disabled = currentQIdx === 0;
  const isLast = currentQIdx === total - 1;
  document.getElementById('nextBtn').textContent = isLast ? '最后一题 ✓' : '下一题 →';
  document.getElementById('qCounter').textContent = `第${chapters[currentChapter].title}章`;

  // scroll to top of question box
  document.querySelector('.q-box').scrollIntoView({behavior:'smooth',block:'center'});
}

function pickOption(i){
  if(submitted) return;
  const q = chapters[currentChapter].questions[currentQIdx];
  const ua = userAnswers[currentQIdx];

  if(q.type === 'single'){
    // toggle or select
    if(ua.picked.has(i)){ ua.picked.clear(); }
    else { ua.picked.clear(); ua.picked.add(i); }
  } else {
    // multi: toggle
    if(ua.picked.has(i)) ua.picked.delete(i);
    else ua.picked.add(i);
  }

  // re-render options only
  const optsDiv = document.getElementById('qOptions');
  const letters = 'ABCDEFGH';
  let html = '';
  q.opts.forEach((opt, j) => {
    const picked = ua.picked.has(j);
    html += `<button class="opt-btn${picked?' picked':''}" onclick="pickOption(${j})">
      <span class="opt-letter">${letters[j]}</span>
      <span class="opt-text">${opt}</span>
    </button>`;
  });
  optsDiv.innerHTML = html;
}

// ==================== NAVIGATION ====================
function prevQ(){
  if(currentQIdx > 0){ currentQIdx--; renderQuestion(); }
}
function nextQ(){
  const total = chapters[currentChapter].questions.length;
  if(currentQIdx < total - 1){ currentQIdx++; renderQuestion(); }
}

// ==================== KEYBOARD ====================
document.addEventListener('keydown',e=>{
  if(!currentChapter || submitted) return;
  const q = chapters[currentChapter].questions[currentQIdx];
  if(e.key === 'ArrowLeft') prevQ();
  if(e.key === 'ArrowRight') nextQ();
  const idx = 'abcdefgh'.indexOf(e.key.toLowerCase());
  if(idx >= 0 && idx < q.opts.length) pickOption(idx);
});

// ==================== SUBMIT ====================
function submitChapter(){
  if(submitted) return;

  // check if all answered
  const unanswered = userAnswers.filter(ua => ua.picked.size === 0).length;
  if(unanswered > 0){
    if(!confirm(`还有 ${unanswered} 题未作答，确定提交吗？`)) return;
  }

  submitted = true;
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('prevBtn').disabled = true;
  document.getElementById('nextBtn').disabled = true;

  const qs = chapters[currentChapter].questions;
  let correct = 0;
  const review = [];

  qs.forEach((q, i) => {
    const ua = userAnswers[i];
    const picked = ua.picked;
    let isCorrect = false;

    if(q.type === 'single'){
      const ans = Array.isArray(q.answer) ? q.answer[0] : q.answer;
      isCorrect = picked.has(ans) && picked.size === 1;
    } else {
      const ansSet = new Set(q.answer);
      isCorrect = picked.size === ansSet.size && [...picked].every(v => ansSet.has(v));
    }

    if(isCorrect) correct++;
    review.push({
      num: i+1,
      type: q.type,
      text: q.text,
      opts: q.opts,
      picked,
      answer: q.answer,
      hint: q.hint,
      ok: isCorrect
    });
  });

  // show result
  showResult(correct, qs.length, review);
}

function showResult(correct, total, review){
  document.getElementById('quizSection').classList.remove('visible');
  const rp = document.getElementById('resultPage');
  rp.classList.add('visible');
  rp.scrollIntoView({behavior:'smooth'});

  const pct = Math.round(correct/total*100);
  document.getElementById('scoreNum').textContent = correct+'/'+total;

  // ring
  const canvas = document.getElementById('ringCanvas');
  const ctx = canvas.getContext('2d');
  const r = 60, cx = 70, cy = 70;
  ctx.clearRect(0,0,140,140);
  // bg
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.strokeStyle='#1e2130'; ctx.lineWidth=10; ctx.stroke();
  // progress
  const color = pct>=80?'#34d399':pct>=50?'#fbbf24':'#f87171';
  const endAngle = -Math.PI/2 + (pct/100)*Math.PI*2;
  ctx.beginPath(); ctx.arc(cx,cy,r,-Math.PI/2,endAngle); ctx.strokeStyle=color; ctx.lineWidth=10; ctx.lineCap='round'; ctx.stroke();

  // grade
  let grade='', msg='';
  if(pct>=90){ grade='🎉 优秀！'; msg='第'+currentChapter+'章知识掌握非常扎实。'; }
  else if(pct>=70){ grade='👍 良好'; msg='基本掌握，建议回顾错题对应的知识点。'; }
  else if(pct>=50){ grade='📖 还需努力'; msg='建议重新阅读本章PPTX讲义和PDF练习题。'; }
  else{ grade='💪 继续加油'; msg='基础知识还需加强，从核心概念开始复习。'; }
  document.getElementById('resultGrade').textContent = grade;
  document.getElementById('resultMsg').textContent = msg;

  // review
  const letters = 'ABCDEFGH';
  let rv = '';
  review.forEach(r => {
    const userStr = [...r.picked].map(i=>letters[i]).join('')||'未选';
    const ansStr = (Array.isArray(r.answer)?r.answer:[r.answer]).map(i=>letters[i]).join('');
    rv += `<div class="review-item">
      <div class="ri-mark ${r.ok?'ok':'err'}">${r.ok?'✓':'✗'}</div>
      <div>
        <strong>${r.type==='multi'?'[多选]':'[单选]'} 第${r.num}题</strong>
        ${r.ok?'<span style="color:var(--green)"> ✅ 正确答案：'+ansStr+'</span>':
          '<span style="color:var(--red)"> ❌ 你的答案：'+userStr+' → 正确答案：'+ansStr+'</span>'}
        <div style="color:var(--muted);margin-top:2px">💡 ${r.hint}</div>
      </div>
    </div>`;
  });
  document.getElementById('reviewList').innerHTML = rv;
}

// ==================== BACK / RETRY ====================
function goBack(){
  submitted = false;
  currentChapter = null;
  document.getElementById('picker').style.display = 'block';
  document.getElementById('quizSection').classList.remove('visible');
  document.getElementById('resultPage').classList.remove('visible');
  document.getElementById('submitBtn').style.display = 'none';
  document.querySelectorAll('.chapter-card').forEach(c=>c.classList.remove('active'));
}

function retryChapter(){
  const ch = currentChapter;
  goBack();
  setTimeout(()=>selectChapter(ch),100);
}

// init
renderChapterGrid();
</script>
