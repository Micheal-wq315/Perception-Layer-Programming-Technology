<!DOCTYPE html><html lang=zh-CN><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1.0"><title>感知层编程技术</title><meta name=theme-color content="#0a0c11">
<style>
:root{--bg:#0a0c11;--s1:#11141c;--b1:#1e2130;--b2:#282c3a;--t1:#e4e6ee;--t2:#a0a5b8;--t3:#6a6f82;--a:#768fff;--g:#3dd68c;--r:#ff6363;--am:#f5a623}
*{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:dark}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--t2);min-height:100svh;line-height:1.55;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;height:52px;padding:0 20px;background:rgba(17,20,28,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--b1)}
nav .brand{font-size:15px;font-weight:700;color:var(--t1);margin-right:auto;letter-spacing:-.3px}
nav a{padding:0 14px;height:52px;display:flex;align-items:center;font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;text-decoration:none;position:relative;transition:.2s}
nav a:hover{color:var(--t2)}nav a.on{color:var(--a)}
nav a.on::after{content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--a);border-radius:1px}
main{max-width:820px;margin:0 auto;padding:0 24px 100px}
[data-p]{display:none}[data-p].on{display:block}
.ttl{font-size:22px;font-weight:800;color:var(--t1);margin:28px 0 6px;text-wrap:balance}
.dsc{font-size:13px;color:var(--t3);margin-bottom:16px}

/* Vertical chapter list */
.cl{display:flex;flex-direction:column;gap:4px;max-height:340px;overflow-y:auto;margin:0 0 16px;scrollbar-width:thin;scrollbar-color:var(--b2) transparent;padding-right:4px}
.cl::-webkit-scrollbar{width:5px}.cl::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
.cr{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;cursor:pointer;transition:.15s;border:1px solid transparent;background:transparent}
.cr:hover{background:rgba(118,143,255,.04);border-color:var(--b1)}
.cr.on{background:rgba(118,143,255,.06);border-color:var(--a)}
.cr .cr-n{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--a);flex-shrink:0;border:1.5px solid var(--b2)}
.cr.on .cr-n{border-color:var(--a);background:var(--a);color:#fff}
.cr .cr-info{flex:1;min-width:0}
.cr .cr-t{font-size:13px;font-weight:600;color:var(--t1)}
.cr .cr-sub{font-size:11px;color:var(--t3);margin-top:1px}
.cr .cr-r{text-align:right;font-size:13px;font-weight:700;color:var(--t3);flex-shrink:0}
.cr .cr-r.done{color:var(--g)}

.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:16px}
.cm{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:12px 8px;text-align:center;cursor:pointer;transition:.2s}
.cm:hover{border-color:var(--a);background:rgba(118,143,255,.04)}
.cm .cn{font-size:18px;font-weight:700;color:var(--t1)}.cm .ct{font-size:11px;color:var(--t3);margin-top:2px}
.cm .cb{height:3px;border-radius:2px;background:var(--b2);margin-top:6px;overflow:hidden}.cm .cf{height:100%;border-radius:2px;transition:width .6s}

.dg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.dc{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:20px 22px;transition:.25s}
.dc:hover{border-color:var(--b2)}.dc .lbl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.dc .val{font-size:28px;font-weight:800;color:var(--t1)}.dc .sub{font-size:12px;color:var(--t3);margin-top:2px}
.dc.hl{border-color:rgba(118,143,255,.25)}.dc.hl .val{color:var(--a)}

.fcw{perspective:900px;margin:0 0 16px}
.fc{position:relative;width:100%;min-height:220px;cursor:pointer;transition:transform .45s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;user-select:none}
.fc.fp{transform:rotateY(180deg)}
.ff{position:absolute;inset:0;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;border:1px solid var(--b1);border-radius:12px;padding:36px 28px;text-align:center;background:var(--s1);flex-direction:column}
.ffr{border-color:rgba(118,143,255,.2)}.ffb{transform:rotateY(180deg);border-color:rgba(61,214,140,.2)}
.flb{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px}
.fq{font-size:19px;font-weight:700;color:var(--t1);line-height:1.5;max-width:560px}
.fa{font-size:18px;font-weight:700;color:var(--g);line-height:1.5;max-width:560px}
.fst{display:flex;gap:20px;margin:0 0 14px;font-size:13px}.fst .sv{font-weight:700;color:var(--t1)}
.fbt{display:flex;gap:10px;justify-content:center;margin:8px 0 20px;display:none}
.fbb{padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.18s;color:#fff;font-family:inherit}.fbb:hover{transform:translateY(-1px)}
.fbf{background:var(--r)}.fbh{background:var(--am);color:#0a0c11}.fbe{background:var(--g);color:#0a0c11}

.qp{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.qp .qb{flex:1;height:5px;background:var(--b2);border-radius:3px;overflow:hidden}
.qp .qf{height:100%;background:var(--a);border-radius:3px;transition:width .4s}
.qbx{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:26px 28px 22px}
.qbd{display:inline-flex;gap:6px;margin-bottom:4px}
.qbd span{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px}
.qbs{background:rgba(118,143,255,.12);color:var(--a)}.qbm{background:rgba(245,166,35,.12);color:var(--am)}
.qt{font-size:15px;color:var(--t1);line-height:1.75;margin:14px 0 18px;font-weight:500}
.qo{display:flex;flex-direction:column;gap:9px}
.qot{display:flex;align-items:flex-start;gap:12px;padding:12px 15px;border:1px solid var(--b1);border-radius:8px;cursor:pointer;transition:.15s;background:transparent;color:var(--t2);font-size:14px;width:100%;text-align:left;font-family:inherit}
.qot:hover{border-color:var(--a);background:rgba(118,143,255,.04)}
.qot:focus-visible{outline:2px solid var(--a);outline-offset:2px}
.qot.pk{border-color:var(--a);background:rgba(118,143,255,.08)}
.qot .lt{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:.15s}
.qot.pk .lt{border-color:var(--a);background:var(--a);color:#fff}
.qnv{display:flex;justify-content:space-between;margin-top:18px;gap:12px}
.qnv button,.abtn{padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--b1);background:var(--s1);color:var(--t2);font-family:inherit;transition:.15s}
.qnv button:focus-visible,.abtn:focus-visible{outline:2px solid var(--a);outline-offset:2px}
.qnv button:hover:not(:disabled),.abtn:hover{border-color:var(--a);color:var(--a)}
.qnv button:disabled{opacity:.35;cursor:default}
.pri{background:var(--a)!important;color:#fff!important;border-color:var(--a)!important}.pri:hover{filter:brightness(1.1)}
.abtn{display:inline-flex;align-items:center;gap:6px;margin:6px 4px}
.res{display:none;text-align:center;padding:30px 0}.res.on{display:block}
.rrg{width:120px;height:120px;border-radius:50%;margin:0 auto 18px;position:relative;display:flex;align-items:center;justify-content:center}
.rrg canvas{position:absolute;inset:0}.rrg .sc{font-size:38px;font-weight:800;z-index:1;color:var(--t1)}
.rgd{font-size:17px;font-weight:700;color:var(--t1);margin-bottom:4px}
.rgm{font-size:13px;color:var(--t3);max-width:360px;margin:0 auto 16px}
.rvw{text-align:left;margin-top:16px}
.rvi{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--b1);font-size:13px}
.rmk{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.rmk.ok{background:rgba(61,214,140,.12);color:var(--g)}.rmk.er{background:rgba(255,99,99,.12);color:var(--r)}

.clg{display:flex;gap:18px;margin-bottom:16px;font-size:12px;color:var(--t3)}
.clg .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
.clg .qz{background:var(--a)}.clg .fl{background:var(--g)}
.cch{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:24px 20px 18px;overflow-x:auto}.cch canvas{display:block;min-width:700px}
.emp{text-align:center;padding:60px 20px;color:var(--t3)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(24,27,38,.95);border:1px solid var(--b2);border-radius:8px;padding:10px 20px;font-size:13px;color:var(--t2);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;box-shadow:0 4px 20px rgba(0,0,0,.4)}.toast.sh{opacity:1}
@media(max-width:600px){.dg{grid-template-columns:1fr}.cg{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}.fc{min-height:200px}.fq{font-size:16px}}
</style></head><body>
<nav><span class=brand>感知层编程技术</span>
<a data-nav=0 class=on href="#">总览</a><a data-nav=1 href="#">速记</a><a data-nav=2 href="#">测试</a><a data-nav=3 href="#">曲线</a></nav>
<main>
<div id=toast class=toast></div>
<div data-p=0 class=on><div class=ttl>学习概览</div><div class=dsc>追踪每一章的掌握进度，数据本地存储不会丢失</div><div class=dg><div class="dc hl"><div class=lbl>题库得分</div><div class=val id=dqz>--</div><div class=sub>13章章节测试综合</div></div><div class=dc><div class=lbl>速记掌握</div><div class=val id=dfl>--</div><div class=sub>知识点卡片间隔记忆</div></div></div><div class=ttl style=font-size:15px;margin-top:18px>章节导航</div><div class=cg id=dashCg></div></div>
<div data-p=1><div class=ttl>知识点速记</div><div class=dsc>点击卡片翻转看答案，标记掌握程度，每3轮自动复习</div><div class=cl id=flashCl style=margin-top:0></div><div id=flashArea style=display:none><div class=fst><span><span class=sv id=fsProg>0/0</span> 已完成</span><span><span class=sv style=color:var(--g) id=fsDone>0</span> 掌握</span><span><span class=sv style=color:var(--am) id=fsRemain>0</span> 待复习</span></div><div class=fcw><div class=fc id=flashC onclick=flipCard()><div class="ff ffr"><div class=flb>Question</div><div class=fq id=fQ></div></div><div class="ff ffb"><div class=flb>Answer</div><div class=fa id=fA></div></div></div></div><div class=fbt id=fBtns><button class="fbb fbf" onclick=ansFlash(-1)>忘了</button><button class="fbb fbh" onclick=ansFlash(0)>模糊</button><button class="fbb fbe" onclick=ansFlash(1)>记住了</button></div><div class=emp id=fDone style=display:none><span style=font-size:48px>🎉</span><div>本轮完成！</div></div></div><div class=emp id=fEmpty>👆 点击章节开始速记</div></div>
<div data-p=2><div class=ttl>章节测试</div><div class=dsc>选择章节开始答题，选完翻到最后提交</div><div class=cl id=qChCl style=margin-top:0></div><div id=qArea style=display:none><div class=qp><div class=qb><div class=qf id=qpBar></div></div><span class=ql id=qpLabel style=font-size:12px;color:var(--t3)>1/10</span></div><div class=qbx><div class=qbd><span class=qbs id=qBadge>单选题</span><span style=color:var(--t3);font-size:12px;margin-left:4px id=qIdx></span></div><div class=qt id=qText></div><div class=qo id=qOpts></div></div><div class=qnv><button id=qPrev onclick=qPrev()>← 上一题</button><button class=pri id=qNext onclick=qNext()>下一题 →</button></div><div id=qSubmitRow style=display:none;text-align:center;margin-top:12px><button class="abtn pri" id=qSubmitBtn onclick=qSubmit() style=padding:12px 48px;font-size:15px>📝 提交本章答案</button></div><div class=res id=qResult><div class=rrg><canvas id=rCanvas width=120 height=120></canvas><span class=sc id=scoreN>0</span></div><div class=rgd id=resGrade></div><div class=rgm id=resMsg></div><div class=rvw id=revList></div><button class=abtn onclick=qBack()>← 返回章节列表</button><button class=abtn onclick=qRetry()>🔄 重做本章</button></div></div><div class=emp id=qEmpty>👆 点击上方章节开始测试</div></div>
<div data-p=3><div class=ttl>学习曲线</div><div class=dsc>章节测试得分 + 速记掌握度的综合可视化</div><div class=clg><span><span class="dot qz"></span>章节测试得分</span><span><span class="dot fl"></span>速记掌握度</span></div><div class=cch><canvas id=cvCanvas width=760 height=320></canvas></div><div style=margin-top:16px;font-size:12px;color:var(--t3);text-align:center>目标线 80% · 数据本地存储跨会话持久化</div></div>
</main>
<script>

  qCh=ch;qI=0;qS=!1;
  qA=C[ch].q.map(()=>({p:new Set()}));
  document.getElementById('qArea').style.display='block';
  document.getElementById('qEmpty').style.display='none';
  document.getElementById('qResult').classList.remove('on');
  document.getElementById('qSubmitRow').style.display='none';
  document.getElementById('qChCl').style.display='none';
  rQQ();
}

function rQQ(){
  if(!qCh||!C[qCh])return;
  const qs=C[qCh].q, q=qs[qI], t=qs.length;
  if(!q)return;
  document.getElementById('qpBar').style.width=((qI+1)/t*100)+'%';
  document.getElementById('qpLabel').textContent=(qI+1)+'/'+t;
  const bd=document.getElementById('qBadge');
  bd.textContent=q.type==='m'?'多选题':'单选题';
  bd.className=q.type==='m'?'qbm':'qbs';
  document.getElementById('qIdx').textContent='第'+(qI+1)+'题 / 共'+t+'题';
  document.getElementById('qText').textContent=q.text;
  const ua=qA[qI];
  const od=document.getElementById('qOpts');
  const lt='ABCDEFGH';
  let h='';
  q.opts.forEach((o,i)=>{h+='<button class=qot'+(ua.p.has(i)?' pk':'')+' data-oi='+i+'><span class=lt>'+lt[i]+'</span><span style="flex:1">'+o+'</span></button>'});
  od.innerHTML=h;
  document.getElementById('qPrev').disabled=qI===0;
  const isLast=qI===t-1;
  const nx=document.getElementById('qNext');
  nx.textContent=isLast?'提交答案 ➤':'下一题 →';
  // Show submit row on last question
  document.getElementById('qSubmitRow').style.display=isLast?'block':'none';
}

function dQOpt(i){
  if(qS||!qCh||!C[qCh])return;
  const q=C[qCh].q[qI]; if(!q)return;
  const ua=qA[qI];
  const od=document.getElementById('qOpts');
  const all=od.querySelectorAll('.qot');
  if(q.type==='m'){
    if(ua.p.has(i)){ua.p.delete(i);all[i].classList.remove('pk')}
    else{ua.p.add(i);all[i].classList.add('pk')}
  }else{
    ua.p.clear();all.forEach(b=>b.classList.remove('pk'));
    ua.p.add(i);all[i].classList.add('pk');
  }
}

document.getElementById('qOpts').addEventListener('click',function(e){
  const btn=e.target.closest('.qot');if(!btn)return;
  dQOpt(parseInt(btn.dataset.oi));
});

function qPrev(){if(qI>0&&qCh){qI--;rQQ()}}

function qNext(){
  if(!qCh||!C[qCh])return;
  const t=C[qCh].q.length;
  if(qI===t-1){qSubmit();return}
  if(qI<t-1){qI++;rQQ()}
}

document.addEventListener('keydown',function(e){
  if(!qCh||qS)return;
  if(e.key==='ArrowLeft')qPrev();
  if(e.key==='ArrowRight')qNext();
  const idx='abcdefgh'.indexOf(e.key.toLowerCase());
  const qq=C[qCh]&&C[qCh].q[qI];
  if(idx>=0&&qq&&idx<qq.opts.length)dQOpt(idx);
});

function qSubmit(){
  if(qS||!qCh||!C[qCh])return;
  const unanswered=qA.filter(u=>u.p.size===0).length;
  if(unanswered>0&&!confirm('还有 '+unanswered+' 题未作答，确定提交吗？'))return;
  qS=!0;
  document.getElementById('qSubmitRow').style.display='none';
  document.getElementById('qPrev').disabled=!0;
  document.getElementById('qNext').disabled=!0;
  const qs=C[qCh].q;
  let c=0;const rv=[];
  qs.forEach((q,i)=>{
    const u=qA[i];let ok=!1;
    if(q.type==='m'){const aS=new Set(q.answer);ok=u.p.size===aS.size&&[...u.p].every(v=>aS.has(v))}
    else{ok=q.answer===[...u.p][0]&&u.p.size===1}
    if(ok)c++;
    rv.push({n:i+1,ty:q.type,tx:q.text,op:q.opts,pk:u.p,an:q.answer,hint:q.hint,ok});
  });
  showR(c,qs.length,rv);
  if(!qs[qCh])qs[qCh]={b:0,t:0};
  if(c>qs[qCh].b)qs[qCh].b=c;
  qs[qCh].t=qs.length;ss('pq',qs);
  upDash();renderQuizCl();
  toast('得分 '+Math.round(c/qs.length*100)+'% · 已保存！');
}

function showR(c,t,rv){
  document.getElementById('qArea').style.display='none';
  const rp=document.getElementById('qResult');
  rp.classList.add('on');rp.scrollIntoView({behavior:'smooth'});
  const p=Math.round(c/t*100);
  document.getElementById('scoreN').textContent=c+'/'+t;
  const cv=document.getElementById('rCanvas'),ctx=cv.getContext('2d');
  const r=50,cx=60,cy=60;
  ctx.clearRect(0,0,120,120);
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='#1e2130';ctx.lineWidth=9;ctx.stroke();
  const co=p>=80?'#34d399':p>=50?'#fbbf24':'#ff6363';
  ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+(p/100)*Math.PI*2);ctx.strokeStyle=co;ctx.lineWidth=9;ctx.lineCap='round';ctx.stroke();
  document.getElementById('resGrade').textContent=p>=90?'🎉 优秀！':p>=70?'👍 良好':p>=50?'📖 还需努力':'💪 继续加油';
  document.getElementById('resMsg').textContent='得分率 '+p+'%';
  const lt='ABCDEFGH';let rh='';
  rv.forEach(r2=>{
    const u=[...r2.pk].map(i=>lt[i]).join('')||'未选';
    const an=(Array.isArray(r2.an)?r2.an:[r2.an]).map(i=>lt[i]).join('');
    rh+='<div class=rvi><div class="rmk '+(r2.ok?'ok':'er')+'">'+(r2.ok?'✓':'✗')+'</div><div><strong>'+(r2.ty==='m'?'[多]':'[单]')+'第'+r2.n+'题</strong> '+(r2.ok?'✅ '+an:'❌ 你的:'+u+' → 正确:'+an)+'<div style=color:var(--t3);font-size:12px>💡 '+r2.hint+'</div></div></div>';
  });
  document.getElementById('revList').innerHTML=rh;
}

function qBack(){
  document.getElementById('qArea').style.display='none';
  document.getElementById('qResult').classList.remove('on');
  document.getElementById('qSubmitRow').style.display='none';
  qCh=null;qI=0;qA=[];qS=!1;
  document.getElementById('qEmpty').style.display='block';
  document.getElementById('qChCl').style.display='';
  renderQuizCl();
}

function qRetry(){
  const ch=qCh;
  qBack();
  if(!ch)return;
  document.getElementById('qEmpty').style.display='none';
  setTimeout(()=>{sQc(ch);document.getElementById('qChCl').style.display='none'},100);
}

// CURVE
function drawCv(){const cv=document.getElementById('cvCanvas'),ctx=cv.getContext('2d');const W=760,H=320;ctx.clearRect(0,0,W,H);const pad={t:30,r:40,b:50,l:55},pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;for(let i=0;i<=12;i++){ctx.beginPath();ctx.moveTo(pad.l+i*pw/12,pad.t);ctx.lineTo(pad.l+i*pw/12,pad.t+ph);ctx.strokeStyle='#1a1d28';ctx.stroke()}for(let i=0;i<=4;i++){ctx.beginPath();ctx.moveTo(pad.l,pad.t+i*ph/4);ctx.lineTo(pad.l+pw,pad.t+i*ph/4);ctx.strokeStyle='#1a1d28';ctx.stroke()}ctx.beginPath();ctx.moveTo(pad.l,pad.t+ph*.2);ctx.lineTo(pad.l+pw,pad.t+ph*.2);ctx.strokeStyle='rgba(61,214,140,.25)';ctx.setLineDash([6,6]);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='rgba(61,214,140,.7)';ctx.font='11px sans-serif';ctx.fillText('80%',pad.l+4,pad.t+ph*.2-6);ctx.fillStyle='#6a6f82';ctx.font='12px sans-serif';ctx.textAlign='center';for(let i=1;i<=13;i++)ctx.fillText(i,pad.l+(i-1)*pw/12+pw/24,pad.t+ph+22);for(let i=0;i<=4;i++)ctx.fillText((100-i*25)+'%',pad.l-14,pad.t+i*ph/4+4);const ct=['概述','开发','MCU','架构','外设','RTOS','OSAL','分层','802','ZB','ZSt','Thr','BLE'];ctx.font='9px sans-serif';ctx.fillStyle='#4a4d60';for(let i=0;i<13;i++)ctx.fillText(ct[i],pad.l+i*pw/12+pw/24,pad.t+ph+36);const bw=pw/12*.32;ctx.textAlign='center';ctx.font='10px sans-serif';for(let c=1;c<=13;c++){const q=qs[c],f=fs[c],qP=q&&q.t?q.b/q.t:0,fT=FD.filter(x=>x.ch===c).length,fP=f&&fT?f.d/fT:0,x=pad.l+(c-1)*pw/12+pw/24,qH=qP*ph,qY=pad.t+ph-qH;ctx.fillStyle='rgba(118,143,255,.6)';ctx.fillRect(x-bw-2,qY,bw,qH);const fH=fP*ph,fY=pad.t+ph-fH;ctx.fillStyle='rgba(61,214,140,.6)';ctx.fillRect(x+2,fY,bw,fH);ctx.fillStyle='#a0a5b8';if(qP>0)ctx.fillText(Math.round(qP*100)+'%',x-bw/2-2,qY-4);if(fP>0)ctx.fillText(Math.round(fP*100)+'%',x+bw/2+2,fY-4)}}
</script>
